<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Interactive Weather Dashboard - Search any city to get current weather and 5-day forecast with real-time data from OpenWeatherMap API.">
    <title>Weather Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Animated background particles -->
    <div class="bg-particles" id="bgParticles"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
                    <path
                        d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
                <h1>Weather Dashboard</h1>
            </div>
            <p class="app-subtitle">Real-time weather data at your fingertips</p>
        </header>

        <!-- Search Section -->
        <section class="search-section" id="searchSection">
            <div class="search-bar">
                <div class="search-input-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none">
                        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
                        <path d="M16 16l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    <input type="text" id="cityInput" placeholder="Search for a city..." autocomplete="off">
                </div>
                <button id="searchBtn" class="btn btn-primary">
                    <span>Search</span>
                    <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                        <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </button>
            </div>

            <!-- Search History -->
            <div class="search-history-container" id="searchHistoryContainer">
                <div class="history-header">
                    <span class="history-label">
                        <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
                            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" />
                            <path d="M12 7v5l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                        Recent Searches
                    </span>
                    <button id="clearHistoryBtn" class="btn-clear">
                        <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
                            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" />
                        </svg>
                        Clear All
                    </button>
                </div>
                <div class="history-chips" id="searchHistory"></div>
            </div>
        </section>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage">
            <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" />
                <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            <span id="errorText">City not found. Please try again.</span>
        </div>

        <!-- Loading Spinner -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Fetching weather data...</p>
        </div>

        <!-- Current Weather Section -->
        <section class="current-weather glass-card" id="currentWeather">
            <div class="current-weather-main">
                <div class="weather-info">
                    <div class="city-name-wrapper">
                        <h2 id="cityName"></h2>
                        <span class="date-time" id="dateTime"></span>
                    </div>
                    <div class="temperature-display">
                        <span class="temp-value" id="temperature"></span>
                        <span class="temp-unit">°C</span>
                    </div>
                    <p class="weather-description" id="weatherDescription"></p>
                </div>
                <div class="weather-icon-container">
                    <img id="weatherIcon" src="" alt="Weather icon" class="weather-icon-large">
                    <div class="icon-glow"></div>
                </div>
            </div>
            <div class="weather-details">
                <div class="detail-card">
                    <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14c-2.21 0-4-1.79-4-4h2c0 1.1.9 2 2 2s2-.9 2-2h2c0 2.21-1.79 4-4 4z"
                            fill="currentColor" opacity="0.7" />
                    </svg>
                    <span class="detail-label">Feels Like</span>
                    <span class="detail-value" id="feelsLike"></span>
                </div>
                <div class="detail-card">
                    <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
                        <path
                            d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2C20 10.48 17.33 6.55 12 2z"
                            fill="currentColor" opacity="0.7" />
                    </svg>
                    <span class="detail-label">Humidity</span>
                    <span class="detail-value" id="humidity"></span>
                </div>
                <div class="detail-card">
                    <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
                        <path
                            d="M14.5 17c0 1.65-1.35 3-3 3s-3-1.35-3-3h6zm-5.26-4h4.53L15 4.5C15 3.12 13.88 2 12.5 2S10 3.12 10 4.5l-.76 8.5z"
                            fill="currentColor" opacity="0.7" />
                    </svg>
                    <span class="detail-label">Wind Speed</span>
                    <span class="detail-value" id="windSpeed"></span>
                </div>
                <div class="detail-card">
                    <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
                        <path
                            d="M12 4V2M12 22v-2M6.34 6.34L4.93 4.93M19.07 19.07l-1.41-1.41M4 12H2M22 12h-2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        <circle cx="12" cy="12" r="4" fill="currentColor" opacity="0.7" />
                    </svg>
                    <span class="detail-label">Pressure</span>
                    <span class="detail-value" id="pressure"></span>
                </div>
                <div class="detail-card">
                    <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
                        <path d="M3 15h4l3-8 4 16 3-8h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <span class="detail-label">Visibility</span>
                    <span class="detail-value" id="visibility"></span>
                </div>
                <div class="detail-card">
                    <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
                        <path
                            d="M17.66 7.93L12 2.27 6.34 7.93c-3.12 3.12-3.12 8.19 0 11.31A7.98 7.98 0 0012 21.58a7.98 7.98 0 005.66-2.34c3.12-3.12 3.12-8.19 0-11.31z"
                            fill="currentColor" opacity="0.7" />
                    </svg>
                    <span class="detail-label">Clouds</span>
                    <span class="detail-value" id="clouds"></span>
                </div>
            </div>
        </section>

        <!-- 5-Day Forecast Section -->
        <section class="forecast-section" id="forecastSection">
            <h2 class="section-title">
                <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
                    <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2" />
                    <path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
                5-Day Forecast
            </h2>
            <div class="forecast-cards" id="forecastCards">
                <!-- Forecast cards will be injected here by JavaScript -->
            </div>
        </section>

        <!-- Footer -->
        <footer class="app-footer">
            <p>Powered by <a href="https://openweathermap.org/" target="_blank" rel="noopener">OpenWeatherMap API</a>
            </p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
